<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEB予約 | TOTONOI Private Sauna</title>
    <link rel="icon" href="images/saunafavicon.png" type="image/png">
  <link rel="apple-touch-icon" href="images/saunafavicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <a href="sauna.html" class="logo">TOTONOI</a>

  <nav class="nav">
    <a href="sauna.html#concept">Concept</a>
    <a href="sauna.html#feature">Feature</a>
    <a href="sauna.html#price">Price</a>
    <a href="sauna.html#access">Access</a>
  </nav>

  <a href="reserve.html" class="header-btn">Reserve</a>
</header>

<main>

<section class="reserve-page">
  <div class="reserve-page-head">
    <p class="label">RESERVE</p>
    <h1>WEB予約</h1>
    <p>
      ご希望の日時とプランを入力してください。<br>
      内容を確認後、担当者よりご連絡いたします。
    </p>
  </div>

  <form class="reserve-form" action="thanks.html" method="get">

    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" placeholder="例：山田 太郎">
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" placeholder="例：totonoi@example.com">
    </div>

    <div class="form-group">
      <label for="tel">電話番号</label>
      <input type="tel" id="tel" name="tel" placeholder="例：090-1234-5678">
    </div>

    <div class="form-group">
      <label for="date">ご希望日</label>
      <input type="date" id="date" name="date">
    </div>

    <div class="form-group">
      <label for="time">ご希望時間</label>
      <input type="time" id="time" name="time">
    </div>

    <div class="form-group">
      <label for="plan">ご希望プラン</label>
      <select id="plan" name="plan">
        <option value="">選択してください</option>
        <option value="standard">Standard / 90min</option>
        <option value="relax">Relax / 120min</option>
        <option value="premium">Premium / 180min</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">ご要望・お問い合わせ</label>
      <textarea id="message" name="message" placeholder="ご質問などがあればご記入ください"></textarea>
    </div>

    <button type="submit" class="form-btn">
      予約内容を送信する
    </button>

  </form>
</section>

</main>

<footer class="footer">
  <p>TOTONOI</p>
  <small>© TOTONOI Private Sauna</small>
</footer>

</body>
</html>
